# Audits all GitHub Actions workflow files with zizmor.

name: Zizmor Audit

permissions: {}

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - ".github/workflows/**"
  pull_request:
    branches:
      - "*"
    paths:
      - ".github/workflows/**"

jobs:
  zizmor:
    name: Audit GitHub Actions
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          # Pin the uv version so setup-uv constructs the release download
          # URL directly. Left unpinned, it resolves the latest release
          # through a GitHub API call at runtime, and an API disruption
          # then fails this job.
          version: "0.11.29"
      # zizmor itself is intentionally not pinned to a version, so that we
      # always audit with the latest release.
      - name: Run zizmor (SARIF)
        if: always()
        run: uvx zizmor --format=sarif .github/workflows/ > results.sarif
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif
          category: zizmor
      - name: Run zizmor (audit)
        run: uvx zizmor .github/workflows/
